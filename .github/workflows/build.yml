name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read   # minimal — this workflow only reads the repo

jobs:
  build:
    name: Minify JS + CSS · PHP lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (minify JS + CSS)
        run: npm run build

      - name: Verify build artefacts exist
        run: |
          test -f wp-content/plugins/sparxstar-data-gap/assets/js/neural-map.min.js \
            && echo "✓ neural-map.min.js"
          test -f wp-content/plugins/sparxstar-data-gap/assets/css/neural-map.min.css \
            && echo "✓ neural-map.min.css"

      - name: PHP lint
        run: php -l wp-content/plugins/sparxstar-data-gap/sparxstar-data-gap.php
